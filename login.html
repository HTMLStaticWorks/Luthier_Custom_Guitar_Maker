<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StringCraft Luthier</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-dark auth-page">

    <div class="auth-wrapper min-vh-100 d-flex align-items-center justify-content-center p-3 position-relative overflow-hidden">
        <!-- Floating Settings -->
        <div class="position-absolute top-0 end-0 p-4 d-flex gap-3 z-3">
            <button id="theme-toggle" class="btn btn-light rounded-circle shadow-sm" aria-label="Toggle theme">
                <i class="bi bi-sun-fill"></i>
            </button>
            <button id="rtl-toggle" class="btn btn-secondary rounded-circle shadow-sm" aria-label="Toggle RTL">
                <i class="bi bi-translate"></i>
            </button>
        </div>
        <!-- Background Decor -->
        <img src="https://images.unsplash.com/photo-1596464716127-f2a82984de30?q=80&w=1200" alt="Auth Background" class="position-absolute w-100 h-100 object-fit-cover opacity-25 start-0 top-0 grayscale-hover">
        <div class="position-absolute w-100 h-100 start-0 top-0 d-flex align-items-center justify-content-center opacity-10">
            <h1 class="brand-font text-white" style="font-size: 20rem; pointer-events: none;">StringCraft</h1>
        </div>

        <div class="container container-auth">
            <div class="row justify-content-center">
                <div class="col-lg-5 col-md-8 reveal-left active">
                    <div class="glass-card">
                        <div class="text-center mb-5">
                            <a href="index.html" class="navbar-brand brand-font fs-2 text-glow mb-4 d-inline-block">
                                <i class="bi bi-soundwave text-primary me-2"></i><span class="text-primary">String</span>Craft
                            </a>
                            <h2 class="h4">Welcome Back</h2>
                            <p class="text-secondary small">Login to access your custom build tracker and exclusive wood selection.</p>
                        </div>
                        <form id="loginForm">
                            <div class="mb-4">
                                <div class="form-floating">
                                    <input type="email" class="form-control bg-transparent border-secondary text-white" id="loginEmail" placeholder="Email">
                                    <label for="loginEmail" class="text-secondary">Email Address</label>
                                </div>
                            </div>
                            <div class="mb-4">
                                <div class="form-floating position-relative">
                                    <input type="password" class="form-control bg-transparent border-secondary text-white" id="loginPass" placeholder="Password">
                                    <label for="loginPass" class="text-secondary">Password</label>
                                    <button type="button" class="btn btn-link position-absolute end-0 top-50 translate-middle-y text-secondary text-decoration-none pe-3"><i class="bi bi-eye"></i></button>
                                </div>
                            </div>
                            <div class="d-flex justify-content-between mb-5 small">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox" id="rememberMe">
                                    <label class="form-check-label text-secondary" for="rememberMe">Remember me</label>
                                </div>
                                <a href="#" class="text-primary text-decoration-none">Forgot Password?</a>
                            </div>
                            <button type="submit" class="btn btn-premium btn-lg w-100 mb-4">Login to Dashboard</button>
                            
                            <div class="social-login-separator position-relative text-center">
                                <span>OR CONTINUE WITH</span>
                            </div>

                            <div class="d-flex justify-content-center gap-3 mb-5">
                                <a href="#" class="social-btn shadow-sm" title="Google"><i class="bi bi-google"></i></a>
                                <a href="#" class="social-btn shadow-sm" title="Facebook"><i class="bi bi-facebook"></i></a>
                                <a href="#" class="social-btn shadow-sm" title="Apple"><i class="bi bi-apple"></i></a>
                            </div>

                            <p class="text-center text-secondary small mb-0">Don't have an account? <a href="signup.html" class="text-primary text-decoration-none fw-bold">Sign up here</a></p>
                        </form>
                    </div>
                    <div class="text-center mt-4">
                        <a href="index.html" class="text-secondary text-decoration-none small"><i class="bi bi-arrow-left me-2"></i> Back to Homepage</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="js/main.js"></script>
</body>
</html>
